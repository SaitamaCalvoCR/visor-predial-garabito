<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Visor Predial — Garabito</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <span class="brand">🗺️ Visor Predial</span>
      <span class="canton">Garabito</span>
      <span class="spacer"></span>
      <span id="status" class="status">conectando…</span>
    </header>

    <main id="main">
      <div id="map"></div>
      <aside id="ficha">
        <div class="ficha-head">
          <h2>Predio</h2>
          <button id="ficha-close" title="Limpiar selección">×</button>
        </div>
        <div id="ficha-body" class="ficha-body">
          <p class="hint">Haz clic en un predio para ver su información.</p>
        </div>
      </aside>
    </main>

    <div id="legend" class="legend"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
